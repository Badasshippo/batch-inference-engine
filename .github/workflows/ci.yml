name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run test suite
        run: pytest -v

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Boot API and exercise endpoints
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/healthz && break
            sleep 1
          done
          JOB=$(curl -sf -X POST http://127.0.0.1:8000/batches \
            -H 'Content-Type: application/json' \
            -d '{"prompts":[{"prompt":"hello"},{"prompt":"world"}]}' | \
            python -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "job_id=$JOB"
          sleep 2
          curl -sf "http://127.0.0.1:8000/jobs/$JOB" | python -m json.tool
          kill $SERVER_PID
