# Horizontal Pod Autoscaler.
# CPU-based out of the box; swap to a custom metric (e.g. inference_latency_seconds
# p95 or scheduler_queue_depth) once a Prometheus Adapter is installed.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: batch-inference-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: batch-inference-engine
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
